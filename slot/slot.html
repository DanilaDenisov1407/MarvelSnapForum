<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Слот-Машина у Баки 🦾</title>
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: url('slotback.png') center center / cover fixed;
  min-height: 100vh;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ============================================================
   SCREENS
   ============================================================ */
.screen {
  display: none;
  width: 100%;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.screen.active { display: flex; }

/* ============================================================
   AUTH BOX
   ============================================================ */
.auth-box {
  background: rgba(0,0,0,0.93);
  border: 3px solid gold;
  border-radius: 20px;
  padding: 32px 28px;
  width: 100%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 0 40px rgba(255,215,0,0.35);
}
.auth-box h1 { color: gold; font-size: 1.4em; margin-bottom: 6px; text-shadow: 0 0 10px rgba(255,215,0,.5); }
.auth-sub    { font-size: .9em; opacity: .6; margin-bottom: 22px; }

.tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.tab  {
  flex: 1; padding: 10px;
  border: 2px solid rgba(255,215,0,.3); border-radius: 10px;
  background: transparent; color: rgba(255,255,255,.6);
  font-size: .95em; cursor: pointer; transition: all .2s;
}
.tab.active, .tab:hover { border-color: gold; color: gold; background: rgba(255,215,0,.08); }

.auth-input {
  display: block; width: 100%;
  padding: 12px 14px; margin-bottom: 12px;
  border: 2px solid rgba(255,255,255,.15); border-radius: 10px;
  background: rgba(255,255,255,.07); color: #fff; font-size: 1em; outline: none;
  transition: border-color .2s;
}
.auth-input:focus { border-color: gold; }
.auth-input::placeholder { color: rgba(255,255,255,.35); }

.auth-btn {
  width: 100%; padding: 13px; margin-top: 4px;
  background: linear-gradient(135deg,#FFD700,#FFA500);
  color: #111; border: none; border-radius: 12px;
  font-size: 1.05em; font-weight: bold; cursor: pointer; transition: all .2s;
}
.auth-btn:hover:not(:disabled) { background: linear-gradient(135deg,#FFA500,#FF6600); transform: translateY(-1px); }
.auth-btn:disabled { background: #444; color: #888; cursor: not-allowed; }

.auth-error { color: #ff6b6b; font-size: .88em; min-height: 1.4em; margin-bottom: 8px; }
.auth-hint  { margin-top: 12px; font-size: .82em; opacity: .55; }

/* ============================================================
   SLOT MACHINE
   ============================================================ */
.slot-machine {
  background: rgba(0,0,0,0.9);
  border: 3px solid gold;
  border-radius: 20px;
  padding: 18px 20px 22px;
  width: 100%;
  max-width: 680px;
  text-align: center;
  box-shadow: 0 0 40px rgba(255,215,0,.4);
}

/* User bar */
.user-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; margin-bottom: 14px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,215,0,.2); border-radius: 10px;
}
.user-name    { flex: 1; font-size: .88em; color: rgba(255,255,255,.75); text-align: left; }
.user-balance { font-weight: bold; color: gold; white-space: nowrap; font-size: .95em; }
.logout-btn   {
  background: transparent; border: 1px solid rgba(255,255,255,.2);
  border-radius: 8px; color: rgba(255,255,255,.5);
  padding: 5px 10px; font-size: .85em; cursor: pointer; white-space: nowrap; transition: all .2s;
}
.logout-btn:hover { border-color: #ff6b6b; color: #ff6b6b; }

.slot-machine h1 { color: gold; font-size: 1.4em; margin-bottom: 4px; text-shadow: 0 0 12px rgba(255,215,0,.5); }
.slot-machine p  { font-size: .9em; opacity: .7; }

/* ── БАРАБАНЫ ───────────────────────────────────── */
.slots-container {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin: 16px auto;
  /* js управляет height */
}

.slot {
  flex-shrink: 0;
  border: 2px solid rgba(255,215,0,.55);
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  background: #050505;
  box-shadow: inset 0 0 20px rgba(0,0,0,.9);
  /* js управляет width и height */
}
/* блики */
.slot::before, .slot::after {
  content: ''; position: absolute; left: 0; right: 0; height: 40px; z-index: 2; pointer-events: none;
}
.slot::before { top: 0;    background: linear-gradient(to bottom, rgba(0,0,0,.85), transparent); }
.slot::after  { bottom: 0; background: linear-gradient(to top,   rgba(0,0,0,.85), transparent); }

.reel {
  position: absolute; top: 0; left: 0; width: 100%;
  display: flex; flex-direction: column;
  will-change: transform;
}

/* Каждый .symbol получает height через JS-атрибут style,
   чтобы гарантированно совпадать с SYM_H */
.symbol {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 6px;
  /* height задаётся через JS */
}
.symbol img {
  width: 100%; height: 100%;
  object-fit: contain; border-radius: 8px; display: block;
}
.symbol.emoji {
  font-size: 3em; line-height: 1;
}

/* ── КНОПКА ─────────────────────────────────────── */
.spin-btn {
  background: linear-gradient(135deg,#FFD700,#FFA500);
  color: #111; border: none;
  padding: 14px 50px; font-size: 1.2em; font-weight: bold;
  border-radius: 12px; cursor: pointer; margin: 12px 0 4px;
  transition: all .2s; box-shadow: 0 4px 18px rgba(255,165,0,.45);
  display: inline-block;
}
.spin-btn:hover:not(:disabled) { background: linear-gradient(135deg,#FFA500,#FF6600); transform: translateY(-2px); }
.spin-btn:active:not(:disabled) { transform: translateY(0); }
.spin-btn:disabled { background: linear-gradient(135deg,#444,#2a2a2a); color: #777; cursor: not-allowed; box-shadow: none; transform: none; }

/* ── РЕЗУЛЬТАТ ──────────────────────────────────── */
.result {
  min-height: 2.4em; padding: 10px 14px;
  border-radius: 10px; font-size: 1.05em; margin-top: 8px; transition: all .3s;
}
.result.win     { background: rgba(255,215,0,.12); border: 2px solid gold; color: gold; font-size: 1.2em; font-weight: bold; animation: winPulse .5s ease-in-out 3; }
.result.jackpot { background: rgba(255,50,0,.18);  border: 2px solid #FF4500; color: #FFD700; font-size: 1.4em; animation: jackpotPulse .35s ease-in-out 5; }
.result.near    { background: rgba(255,165,0,.08); border: 1px solid rgba(255,165,0,.3); color: #FFA500; }
.result.lose    { color: #999; }

.stats-bar { margin-top: 8px; font-size: .8em; color: rgba(255,255,255,.4); }

/* ── АНИМАЦИИ ───────────────────────────────────── */
@keyframes winPulse    { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04); box-shadow:0 0 22px rgba(255,215,0,.55)} }
@keyframes jackpotPulse{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.07); box-shadow:0 0 32px rgba(255,69,0,.75)} }
@keyframes confettiFall{ 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(105vh) rotate(720deg);opacity:0} }

/* ============================================================
   MOBILE
   ============================================================ */
@media (max-width: 560px) {
  .slot-machine { padding: 10px 8px 14px; border-radius: 14px; }
  .slot-machine h1 { font-size: 1.05em; }
  .spin-btn { padding: 11px 28px; font-size: 1em; }
  .result   { font-size: .9em; }
  .user-bar { padding: 6px 8px; }
  .user-name { font-size: .78em; }
  .logout-btn{ font-size: .75em; padding: 4px 6px; }
  .slots-container { gap: 6px; }
}
</style>
</head>
<body>

<!-- ══ AUTH ══════════════════════════════════════ -->
<div id="screen-auth" class="screen">
  <div class="auth-box">
    <h1>Слот-Машина у Баки 🦾</h1>
    <p class="auth-sub">Войди чтобы крутить!</p>

    <div class="tabs">
      <button class="tab active" id="tab-login">Войти</button>
      <button class="tab"        id="tab-reg">Регистрация</button>
    </div>

    <div id="form-login">
      <input class="auth-input" id="login-username" type="text"     placeholder="@логин"   autocomplete="username">
      <input class="auth-input" id="login-password" type="password" placeholder="Пароль"   autocomplete="current-password">
      <div class="auth-error" id="login-error"></div>
      <button class="auth-btn" id="login-btn">Войти</button>
    </div>

    <div id="form-reg" style="display:none">
      <input class="auth-input" id="reg-username" type="text"     placeholder="@логин (с @)"       autocomplete="username">
      <input class="auth-input" id="reg-password" type="password" placeholder="Пароль ≥ 6 символов" autocomplete="new-password">
      <div class="auth-error" id="reg-error"></div>
      <button class="auth-btn" id="reg-btn">Зарегистрироваться</button>
      <p class="auth-hint">При регистрации получишь 3000 🎲 кубов</p>
    </div>
  </div>
</div>

<!-- ══ SLOT ══════════════════════════════════════ -->
<div id="screen-slot" class="screen">
  <div class="slot-machine">

    <div class="user-bar">
      <span class="user-name"    id="user-name">@username</span>
      <span class="user-balance" id="user-balance">— 🎲</span>
      <button class="logout-btn" id="logout-btn">↩ Выйти</button>
    </div>

    <h1 id="slot-title">Слот-Машина у Баки 🦾</h1>
    <p>Удачи! 😄</p>

    <div class="slots-container" id="slots-container">
      <div class="slot" id="slot0"><div class="reel" id="reel0"></div></div>
      <div class="slot" id="slot1"><div class="reel" id="reel1"></div></div>
      <div class="slot" id="slot2"><div class="reel" id="reel2"></div></div>
    </div>

    <button class="spin-btn" id="spinBtn" disabled>Загрузка...</button>
    <div class="result" id="result"></div>
    <div class="stats-bar" id="stats-bar"></div>
  </div>
</div>

<script>
// ============================================================
//  КОНФИГ
// ============================================================
const API = 'https://script.google.com/macros/s/AKfycbx3jwUPotluP3qIHNvM6HiizPdLU-QJQdcTKMJiOXpaWnR606yj9gWe1fj32sEGrve78Q/exec';
const N_REELS = 3;

// ============================================================
//  УТИЛИТЫ
// ============================================================
const $ = id => document.getElementById(id);

async function api(params) {
  const r = await fetch(API + '?' + new URLSearchParams(params));
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(name).classList.add('active');
}

function setResult(text, cls) {
  const el = $('result');
  el.textContent = text;
  el.className = 'result' + (cls ? ' ' + cls : '');
}

// ============================================================
//  СЕССИЯ
// ============================================================
let user = null;

function saveSession() { try { localStorage.setItem('mss', JSON.stringify(user)); } catch(e){} }
function loadSession() { try { return JSON.parse(localStorage.getItem('mss')); } catch(e){ return null; } }
function clearSession(){ try { localStorage.removeItem('mss'); } catch(e){} }

function updateUserBar() {
  if (!user) return;
  $('user-name').textContent    = user.username;
  $('user-balance').textContent = (user.balance ?? 0) + ' 🎲';
  $('stats-bar').textContent    = 'Всего спинов: ' + (user.spins ?? 0) + ' · Побед: ' + (user.wins ?? 0);
}

// ============================================================
//  АВТОРИЗАЦИЯ
// ============================================================
async function doLogin() {
  const username = $('login-username').value.trim().toLowerCase();
  const password = $('login-password').value.trim();
  const err      = $('login-error');
  const btn      = $('login-btn');
  err.textContent = '';
  if (!username || !password) { err.textContent = 'Заполни все поля'; return; }
  btn.disabled = true; btn.textContent = 'Входим...';
  try {
    const d = await api({ action:'login', username, password });
    if (!d.ok) throw new Error(d.error);
    user = { username: d.username, balance: d.balance, spins: d.spins, wins: d.wins ?? 0 };
    saveSession();
    await enterSlot();
  } catch(e) { err.textContent = '❌ ' + e.message; }
  finally    { btn.disabled = false; btn.textContent = 'Войти'; }
}

async function doRegister() {
  const username = $('reg-username').value.trim().toLowerCase();
  const password = $('reg-password').value.trim();
  const err      = $('reg-error');
  const btn      = $('reg-btn');
  err.textContent = '';
  if (!username || !password) { err.textContent = 'Заполни все поля'; return; }
  btn.disabled = true; btn.textContent = 'Создаём...';
  try {
    const d = await api({ action:'register', username, password });
    if (!d.ok) throw new Error(d.error);
    user = { username: d.username, balance: d.balance, spins: 0, wins: 0 };
    saveSession();
    await enterSlot();
  } catch(e) { err.textContent = '❌ ' + e.message; }
  finally    { btn.disabled = false; btn.textContent = 'Зарегистрироваться'; }
}

function doLogout() {
  user = null; clearSession();
  ['login-username','login-password','reg-username','reg-password'].forEach(id => $(id).value = '');
  ['login-error','reg-error'].forEach(id => $(id).textContent = '');
  // Сбрасываем барабаны чтобы при следующем входе не было старых данных
  symbols = []; pool = [];
  showScreen('screen-auth');
}

// ============================================================
//  РАЗМЕРЫ БАРАБАНОВ
// ============================================================
let SYM_H = 200, SYM_W = 170;

function calcSizes() {
  const vw = window.innerWidth;
  if      (vw <= 400) { SYM_H = 90;  SYM_W = 88;  }
  else if (vw <= 560) { SYM_H = 110; SYM_W = 100; }
  else if (vw <= 768) { SYM_H = 150; SYM_W = 136; }
  else                { SYM_H = 200; SYM_W = 170; }
}

// ============================================================
//  ДАННЫЕ
// ============================================================
let characters = [];
let symbols    = []; // [{characterId, name, rarity, url}]
let pool       = []; // symbols × 8 — общий пул для всех барабанов
let settings   = { jackpot_chance: 0.0001, win_chance: 0.05, slot_title: 'Слот-Машина у Баки 🦾' };

async function enterSlot() {
  showScreen('screen-slot');
  updateUserBar();
  calcSizes();
  await loadCards();
}

async function loadCards() {
  const btn = $('spinBtn');
  btn.disabled = true; btn.textContent = 'Загрузка...';
  setResult('Загружаем карты...');

  try {
    const d = await api({ action: 'cards' });
    if (d.error) throw new Error(d.error);

    Object.assign(settings, d.settings || {});
    if (settings.slot_title) $('slot-title').textContent = settings.slot_title;

    characters = (d.characters || []).filter(c => c.variants?.length > 0);
    if (!characters.length) throw new Error('Таблица Cards пустая или нет URL');

    buildSymbols();
    // Предзагружаем картинки прежде чем строить барабаны
    await preloadSymbols();
    buildReels();

    btn.disabled = false; btn.textContent = 'Крутить!';
    setResult('');
  } catch(e) {
    console.error('loadCards:', e.message);
    setResult('⚠️ ' + e.message);
    useFallback();
  }
}

function buildSymbols() {
  symbols = characters.map(c => {
    const url = c.variants[Math.floor(Math.random() * c.variants.length)];
    return { characterId: String(c.id), name: c.name || '?', rarity: c.rarity || '', url: url || '' };
  }).filter(s => s.url && s.url.startsWith('http'))
    .sort(() => Math.random() - 0.5);

  // Пул = 8 повторений (гарантирует что найдём цель при любой скорости прокрутки)
  pool = [];
  for (let r = 0; r < 8; r++) symbols.forEach(s => pool.push(s));
}

// Предзагрузка с таймаутом — убираем битые URL из symbols ДО построения барабанов
function preloadSymbols() {
  const TIMEOUT = 4000;
  return Promise.all(
    symbols.map(sym => new Promise(resolve => {
      const img = new Image();
      const t   = setTimeout(() => { sym._broken = true; resolve(); }, TIMEOUT);
      img.onload  = () => { clearTimeout(t); resolve(); };
      img.onerror = () => { clearTimeout(t); sym._broken = true; resolve(); };
      img.src = sym.url;
    }))
  ).then(() => {
    const before = symbols.length;
    symbols = symbols.filter(s => !s._broken);
    console.log(`Предзагрузка: ${before} → ${symbols.length} валидных`);
    if (!symbols.length) throw new Error('Все картинки недоступны');
    // Перестраиваем пул из валидных символов
    pool = [];
    for (let r = 0; r < 8; r++) symbols.forEach(s => pool.push(s));
  });
}

// ============================================================
//  БАРАБАНЫ
// ============================================================
function buildReels() {
  calcSizes();

  // Контейнер
  const container = $('slots-container');
  container.style.height = SYM_H + 'px';

  for (let i = 0; i < N_REELS; i++) {
    const slot = $('slot' + i);
    const reel = $('reel' + i);

    slot.style.width  = SYM_W + 'px';
    slot.style.height = SYM_H + 'px';

    reel.innerHTML = '';
    reel.style.transition = '';

    pool.forEach(sym => {
      const div = document.createElement('div');
      div.className  = 'symbol';
      div.style.height = SYM_H + 'px'; // ← ключевое: высота задана явно

      const img = document.createElement('img');
      img.src = sym.url;
      img.alt = sym.name;
      img.title = sym.name + (sym.rarity ? ' · ' + sym.rarity : '');
      // onerror скрываем div, но символ уже прошёл предзагрузку — это крайний случай
      img.onerror = () => { div.style.visibility = 'hidden'; };
      div.appendChild(img);
      reel.appendChild(div);
    });

    // Стартовая позиция — середина пула, немного рандома
    const startRow = Math.floor(pool.length * 0.4) + Math.floor(Math.random() * symbols.length);
    positions[i] = -(startRow * SYM_H);
    reel.style.transform = `translateY(${positions[i]}px)`;
  }
}

// ============================================================
//  АНИМАЦИЯ
// ============================================================
let spinning     = false;
let stoppedCount = 0;
let animationIds = [null, null, null];
let positions    = [0, 0, 0];
let isSpinning   = [false, false, false];
let finalSymbols = [null, null, null];
let stopTargets  = [0, 0, 0]; // индексы в symbols[]

function spinReel(idx) {
  const reel = $('reel' + idx);
  const isMob = window.innerWidth <= 560;
  const maxSpd = isMob ? 12 : 18;
  const accel  = isMob ? 3  : 4;

  let speed = 0, last = performance.now(), braking = false;
  const totalH = pool.length * SYM_H;

  function frame(now) {
    const dt = Math.min(now - last, 48); last = now;

    if (!isSpinning[idx] && !braking) {
      braking = true;
      landReel(idx, reel);
      return;
    }
    if (braking) return;

    speed = Math.min(maxSpd, speed + accel * dt / 16);
    positions[idx] -= speed;

    // Зацикливание: прыгаем назад на 40% когда прошли 65%
    if (-positions[idx] > totalH * 0.65) {
      positions[idx] += totalH * 0.4;
    }

    reel.style.transform = `translateY(${Math.round(positions[idx])}px)`;
    animationIds[idx] = requestAnimationFrame(frame);
  }
  animationIds[idx] = requestAnimationFrame(frame);
}

function landReel(idx, reel) {
  const target = symbols[stopTargets[idx]];
  const curRow  = Math.round(-positions[idx] / SYM_H);

  // Ищем ближайшее вхождение target.url вперёд от curRow (мин +2)
  let tRow = -1;
  for (let i = curRow + 2; i < pool.length; i++) {
    if (pool[i]?.url === target.url) { tRow = i; break; }
  }
  if (tRow === -1) {
    for (let i = 0; i < pool.length; i++) {
      if (pool[i]?.url === target.url) { tRow = i; break; }
    }
  }
  if (tRow === -1) tRow = Math.floor(pool.length * 0.4) + stopTargets[idx];

  const tPos = -(tRow * SYM_H);
  reel.style.transition = `transform 0.38s cubic-bezier(0.25,0.46,0.45,0.94)`;
  reel.style.transform  = `translateY(${tPos}px)`;
  positions[idx]        = tPos;

  ;(function(i, sym) {
    setTimeout(() => {
      $('reel' + i).style.transition = '';
      finalSymbols[i] = sym;
      stoppedCount++;
      if (stoppedCount === N_REELS) finishSpin();
    }, 400);
  })(idx, target);
}

// ============================================================
//  СПИН
// ============================================================
function spin() {
  if (spinning || !symbols.length) return;
  spinning     = true;
  stoppedCount = 0;
  finalSymbols = [null, null, null];

  $('spinBtn').disabled    = true;
  $('spinBtn').textContent = 'Крутит...';
  setResult('');

  const roll = Math.random();
  const J = Number(settings.jackpot_chance) || 0.0001;
  const W = Number(settings.win_chance)     || 0.05;

  if (roll < J) {
    // Джекпот
    const i = Math.floor(Math.random() * symbols.length);
    stopTargets = [i, i, i];

  } else if (roll < J + W) {
    // Победа: 3 варианта одного персонажа
    const winners = characters.filter(c => c.variants.length >= 3);
    const src     = winners.length ? winners : characters;
    const winner  = src[Math.floor(Math.random() * src.length)];
    const picks   = [...winner.variants].sort(() => Math.random() - 0.5).slice(0, 3);

    stopTargets = picks.map(url => {
      const k = symbols.findIndex(s => s.url === url);
      if (k !== -1) return k;
      const ns = { characterId: String(winner.id), name: winner.name, url, rarity: winner.rarity || '' };
      symbols.push(ns); pool.push(ns);
      return symbols.length - 1;
    });

  } else {
    stopTargets = [0,1,2].map(() => Math.floor(Math.random() * symbols.length));
  }

  // Запуск
  for (let i = 0; i < N_REELS; i++) {
    isSpinning[i] = true;
    if (animationIds[i]) cancelAnimationFrame(animationIds[i]);
    spinReel(i);
  }

  const isMob  = window.innerWidth <= 560;
  const delays = isMob ? [900,1400,1900] : [1100,1700,2300];
  delays.forEach((d, i) => setTimeout(() => { isSpinning[i] = false; }, d));

  // Страховка
  setTimeout(() => {
    if (!spinning) return;
    finalSymbols = finalSymbols.map((s, i) => s || symbols[stopTargets[i]] || symbols[0]);
    finishSpin();
  }, isMob ? 3500 : 4500);
}

// ============================================================
//  ФИНИШ
// ============================================================
function finishSpin() {
  if (!spinning) return;
  spinning = false;

  for (let i = 0; i < N_REELS; i++) {
    isSpinning[i] = false;
    if (animationIds[i]) { cancelAnimationFrame(animationIds[i]); animationIds[i] = null; }
  }

  $('spinBtn').disabled    = false;
  $('spinBtn').textContent = 'Крутить!';

  finalSymbols = finalSymbols.map((s, i) => s || symbols[stopTargets[i]] || symbols[0]);

  const s   = finalSymbols;
  const ids = s.map(x => x?.characterId);
  let won   = false;
  let cls   = 'lose';

  if (s[0].url === s[1].url && s[1].url === s[2].url) {
    setResult('🎰 ДЖЕКПОТ! Три одинаковых! 🎉🎉🎉', 'win jackpot');
    launchConfetti(80); won = true; cls = 'jackpot';

  } else if (ids[0] && ids[0] === ids[1] && ids[1] === ids[2]) {
    setResult('🏆 ПОБЕДА! Три ' + s[0].name + '! Красавчик! 🎊', 'win');
    launchConfetti(50); won = true; cls = 'win';

  } else if (ids[0] === ids[1] || ids[1] === ids[2] || ids[0] === ids[2]) {
    const pair = (ids[0]===ids[1]||ids[0]===ids[2]) ? s[0].name : s[1].name;
    setResult('😬 Почти! Два ' + pair + ' — ещё разок!', 'near'); cls = 'near';

  } else {
    const phrases = ['Мимо! 😅 Бака-машина не жалеет','Не повезло! 💸 Попробуй ещё','Слот смеётся над тобой 😈','Облом! Карты не в твою пользу 🃏'];
    setResult(phrases[Math.floor(Math.random() * phrases.length)], 'lose');
  }

  // Локальное обновление
  if (user) {
    user.spins = (user.spins || 0) + 1;
    if (won) user.wins = (user.wins || 0) + 1;
    saveSession();
    updateUserBar();
  }

  // Запись в таблицу (fire-and-forget)
  if (user) {
    api({ action: 'spin_result', username: user.username, won: won ? 1 : 0 })
      .catch(e => console.warn('spin_result:', e.message));
  }
}

// ============================================================
//  КОНФЕТТИ
// ============================================================
function launchConfetti(n) {
  const colors = ['#FFD700','#FF4500','#00BFFF','#FF69B4','#7FFF00'];
  for (let i = 0; i < n; i++) {
    const el = document.createElement('div');
    el.style.cssText =
      'position:fixed;top:-10px;pointer-events:none;z-index:9999;' +
      `left:${Math.random()*100}vw;` +
      `width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;` +
      `background:${colors[Math.floor(Math.random()*colors.length)]};` +
      `border-radius:${Math.random()>.5?'50%':'2px'};` +
      `animation:confettiFall ${1.5+Math.random()*2}s ease-in forwards;` +
      `animation-delay:${Math.random()*0.5}s;`;
    document.body.appendChild(el);
    el.addEventListener('animationend', function(){ this.remove(); });
  }
}

// ============================================================
//  ФОЛЛБЭК (если API недоступен)
// ============================================================
function useFallback() {
  const emojis = ['🍋','🍒','🍊','🍇','🔔','⭐','💎','🃏','🎯','🏆'];
  characters = emojis.map((e,i) => ({ id:String(i), name:e, variants:[e], rarity:'' }));
  symbols    = emojis.map((e,i) => ({ characterId:String(i), name:e, url:e, rarity:'' }));
  pool = [];
  for (let r = 0; r < 8; r++) symbols.forEach(s => pool.push(s));

  calcSizes();
  const container = $('slots-container');
  container.style.height = SYM_H + 'px';

  for (let i = 0; i < N_REELS; i++) {
    const slot = $('slot'+i), reel = $('reel'+i);
    slot.style.width = SYM_W+'px'; slot.style.height = SYM_H+'px';
    reel.innerHTML = '';
    pool.forEach(sym => {
      const div = document.createElement('div');
      div.className = 'symbol emoji';
      div.style.height = SYM_H + 'px';
      div.textContent = sym.url;
      reel.appendChild(div);
    });
    const startRow = Math.floor(pool.length * 0.4);
    positions[i] = -(startRow * SYM_H);
    reel.style.transform = `translateY(${positions[i]}px)`;
  }

  $('spinBtn').disabled = false;
  $('spinBtn').textContent = 'Крутить!';
  setResult('');
}

// ============================================================
//  INIT — все события вешаем сразу через DOMContentLoaded
// ============================================================
document.addEventListener('DOMContentLoaded', () => {

  // Вкладки
  $('tab-login').addEventListener('click', () => {
    $('tab-login').classList.add('active'); $('tab-reg').classList.remove('active');
    $('form-login').style.display = 'block'; $('form-reg').style.display = 'none';
  });
  $('tab-reg').addEventListener('click', () => {
    $('tab-reg').classList.add('active'); $('tab-login').classList.remove('active');
    $('form-reg').style.display = 'block'; $('form-login').style.display = 'none';
  });

  // Auth
  $('login-btn').addEventListener('click', doLogin);
  $('reg-btn').addEventListener('click', doRegister);
  ['login-username','login-password'].forEach(id => $(id).addEventListener('keydown', e => e.key==='Enter' && doLogin()));
  ['reg-username','reg-password'].forEach(id => $(id).addEventListener('keydown', e => e.key==='Enter' && doRegister()));

  // Logout + Spin
  $('logout-btn').addEventListener('click', doLogout);
  $('spinBtn').addEventListener('click', spin);

  // Resize
  let rt;
  window.addEventListener('resize', () => {
    clearTimeout(rt);
    rt = setTimeout(() => { if (!spinning && symbols.length) buildReels(); }, 250);
  });

  // Восстановление сессии
  const saved = loadSession();
  if (saved) { user = saved; enterSlot(); return; }
  showScreen('screen-auth');
});

window.addEventListener('beforeunload', () => {
  for (let i = 0; i < N_REELS; i++) if (animationIds[i]) cancelAnimationFrame(animationIds[i]);
});
</script>
